<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지 - 한영교회 주일학교</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #333;
        }

        nav {
            background: linear-gradient(135deg, #3B5998 0%, #8B6BB8 100%);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1em;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #FFD700;
        }

        .container {
            margin: 40px auto;
            padding: 0 20px;
            max-width: 1400px;
        }

        .admin-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        h1 {
            color: #3B5998;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }

        .status {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-weight: 600;
        }

        .status.show { display: block; }
        .status.success { background: #c8e6c9; color: #2e7d32; }
        .status.error { background: #ffcdd2; color: #d32f2f; }
        .status.loading { background: #e3f2fd; color: #1976d2; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        th, td {
            border: 2px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background: linear-gradient(135deg, #3B5998 0%, #2E4A7A 100%);
            color: white;
            font-weight: 600;
            min-width: 120px;
        }

        td {
            background: #f9f9f9;
        }

        .student-name {
            font-weight: 600;
            color: #3B5998;
            text-align: left;
            min-width: 100px;
        }

        input[type="number"] {
            width: 100%;
            height: 45px;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1.3em;
            font-weight: 600;
            text-align: center;
            box-sizing: border-box;
            line-height: 29px;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #3B5998;
            background: #f0f8ff;
        }

        .total-cell {
            background: linear-gradient(135deg, #fff9e6 0%, #fffacd 100%);
            font-weight: bold;
            color: #ff6b00;
            min-width: 70px;
        }

        .initial-cell {
            background: #e8f5e9;
            font-weight: 600;
        }

        .month-group {
            border-right: 3px solid #3B5998;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.05em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-save {
            background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
            color: white;
            min-width: 200px;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(46, 125, 50, 0.3);
        }

        footer {
            background: #3B5998;
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin-top: 60px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        @media (max-width: 1024px) {
            table {
                font-size: 0.8em;
            }

            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <!-- 네비게이션 -->
    <nav>
        <ul>
            <li><a href="index.html">🏠 홈</a></li>
            <li><a href="learning.html">📚 학습자료</a></li>
            <li><a href="talents.html">⭐ 달란트</a></li>
        </ul>
    </nav>

    <!-- 메인 컨테이너 -->
    <div class="container">
        <div class="admin-card">
            <h1>🔐 관리자 페이지 - 달란트 관리 (2026년)</h1>

            <div id="status" class="status"></div>

            <div class="table-wrapper">
                <table id="talentTable">
                    <thead>
                        <tr>
                            <th>학생</th>
                            <th class="total-cell">누적</th>
                            <th class="initial-cell">최초</th>
                            <th colspan="4" class="month-group">6월</th>
                            <th colspan="4" class="month-group">7월</th>
                            <th colspan="5" class="month-group">8월</th>
                            <th colspan="4" class="month-group">9월</th>
                            <th colspan="4" class="month-group">10월</th>
                            <th colspan="5" class="month-group">11월</th>
                            <th colspan="4" class="month-group">12월</th>
                        </tr>
                        <tr>
                            <th colspan="3"></th>
                            <th>1주</th><th>2주</th><th>3주</th><th>4주</th>
                            <th>1주</th><th>2주</th><th>3주</th><th>4주</th>
                            <th>1주</th><th>2주</th><th>3주</th><th>4주</th><th>5주</th>
                            <th>1주</th><th>2주</th><th>3주</th><th>4주</th>
                            <th>1주</th><th>2주</th><th>3주</th><th>4주</th>
                            <th>1주</th><th>2주</th><th>3주</th><th>4주</th><th>5주</th>
                            <th>1주</th><th>2주</th><th>3주</th><th>4주</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- JavaScript로 동적 생성 -->
                    </tbody>
                </table>
            </div>

            <div class="button-group">
                <button type="button" class="btn-save" onclick="saveTalents()">💾 저장 및 배포</button>
            </div>
        </div>
    </div>

    <!-- 푸터 -->
    <footer>
        <p>&copy; 2024 한영교회 주일학교. All rights reserved.</p>
    </footer>

    <script>
        const students = ['junyoung', 'joshua', 'elliot', 'anna', 'moses', 'yerim'];
        const studentNames = {
            'junyoung': 'Junyoung',
            'joshua': 'Joshua',
            'elliot': 'Elliot',
            'anna': 'Anna',
            'moses': 'Moses',
            'yerim': 'Yerim'
        };

        // 2026년 월별 주 개수
        const weeksPerMonth = {
            '6': 4, '7': 4, '8': 5, '9': 4, '10': 4, '11': 5, '12': 4
        };

        // 월 이름
        const monthNames = {
            '6': '6월', '7': '7월', '8': '8월', '9': '9월',
            '10': '10월', '11': '11월', '12': '12월'
        };

        function generateTableRows() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            students.forEach(studentId => {
                const row = document.createElement('tr');

                // 학생 이름
                const nameCell = document.createElement('td');
                nameCell.className = 'student-name';
                nameCell.textContent = studentNames[studentId];
                row.appendChild(nameCell);

                // 누적 달란트 (읽기 전용)
                const totalCell = document.createElement('td');
                totalCell.className = 'total-cell';
                totalCell.id = `${studentId}-total`;
                totalCell.textContent = '0';
                row.appendChild(totalCell);

                // 최초 달란트
                const initialCell = document.createElement('td');
                initialCell.className = 'initial-cell';
                const initialInput = document.createElement('input');
                initialInput.type = 'number';
                initialInput.id = `${studentId}-initial`;
                initialInput.min = '0';
                initialInput.value = '0';
                initialInput.onchange = () => updateTotal(studentId);
                initialCell.appendChild(initialInput);
                row.appendChild(initialCell);

                // 각 월별 주 입력 칸
                for (let month of ['6', '7', '8', '9', '10', '11', '12']) {
                    const weeks = weeksPerMonth[month];
                    for (let week = 1; week <= weeks; week++) {
                        const cell = document.createElement('td');
                        const input = document.createElement('input');
                        input.type = 'number';
                        input.id = `${studentId}-${month}-${week}`;
                        input.min = '0';
                        input.value = '0';
                        input.onchange = () => updateTotal(studentId);
                        cell.appendChild(input);
                        if (week === weeks) {
                            cell.className = 'month-group';
                        }
                        row.appendChild(cell);
                    }
                }

                tbody.appendChild(row);
            });
        }

        function updateTotal(studentId) {
            let total = parseInt(document.getElementById(`${studentId}-initial`).value) || 0;

            for (let month of ['6', '7', '8', '9', '10', '11', '12']) {
                const weeks = weeksPerMonth[month];
                for (let week = 1; week <= weeks; week++) {
                    const val = parseInt(document.getElementById(`${studentId}-${month}-${week}`).value) || 0;
                    total += val;
                }
            }

            document.getElementById(`${studentId}-total`).textContent = total;
        }

        function showStatus(type, message) {
            const el = document.getElementById('status');
            el.className = 'status show ' + type;
            el.textContent = message;
        }

        // 페이지 로드 시 데이터 불러오기
        function loadTalents() {
            fetch('/get-talents')
                .then(r => {
                    if (!r.ok) throw new Error('API not available');
                    return r.json();
                })
                .then(data => {
                    if (data.success) {
                        const talents = data.talents;
                        students.forEach(studentId => {
                            if (talents[studentId]) {
                                const studentData = talents[studentId];
                                document.getElementById(`${studentId}-initial`).value = studentData.initial || 0;

                                if (studentData.weeks) {
                                    for (let [key, value] of Object.entries(studentData.weeks)) {
                                        const inputId = `${studentId}-${key}`;
                                        const input = document.getElementById(inputId);
                                        if (input) {
                                            input.value = value || 0;
                                        }
                                    }
                                }

                                updateTotal(studentId);
                            }
                        });
                        showStatus('success', '✅ 데이터를 불러왔습니다!');
                    } else {
                        showStatus('error', '❌ 오류: ' + data.message);
                    }
                })
                .catch(e => {
                    // API 불가능 시 로컬 파일에서 로드
                    console.log('로컬 데이터 로드 시도...');
                    loadTalentsFromJSON();
                });
        }

        function loadTalentsFromJSON() {
            fetch('/get-talents')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        const talents = data.talents;
                        students.forEach(studentId => {
                            if (talents[studentId]) {
                                const studentData = talents[studentId];
                                document.getElementById(`${studentId}-initial`).value = studentData.initial || 0;

                                if (studentData.weeks) {
                                    for (let [key, value] of Object.entries(studentData.weeks)) {
                                        const inputId = `${studentId}-${key}`;
                                        const input = document.getElementById(inputId);
                                        if (input) {
                                            input.value = value || 0;
                                        }
                                    }
                                }

                                updateTotal(studentId);
                            }
                        });
                        showStatus('success', '✅ 데이터를 불러왔습니다!');
                    } else {
                        showStatus('error', '❌ ' + data.message);
                    }
                })
                .catch(e => {
                    console.error('오류:', e);
                    showStatus('error', '❌ 데이터를 불러올 수 없습니다');
                });
        }

        // 데이터 저장 및 배포
        function saveTalents() {
            const talentsData = {};

            students.forEach(studentId => {
                talentsData[studentId] = {
                    initial: parseInt(document.getElementById(`${studentId}-initial`).value) || 0,
                    weeks: {}
                };

                for (let month of ['6', '7', '8', '9', '10', '11', '12']) {
                    const weeks = weeksPerMonth[month];
                    for (let week = 1; week <= weeks; week++) {
                        const key = `${month}-${week}`;
                        talentsData[studentId].weeks[key] = parseInt(document.getElementById(`${studentId}-${month}-${week}`).value) || 0;
                    }
                }
            });

            showStatus('loading', '⏳ 데이터를 저장하는 중...');

            fetch('/save-talents', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ talents: talentsData })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        showStatus('loading', '⏳ GitHub에 배포하는 중...');

                        return fetch('/run-git-push')
                            .then(r => r.json())
                            .then(deployData => {
                                if (deployData.success) {
                                    showStatus('success', '✅ 저장 완료! GitHub에 배포되었습니다. (1-3분 후 반영)');
                                } else {
                                    showStatus('success', '✅ 저장되었습니다! (배포: ' + deployData.message + ')');
                                }
                            });
                    } else {
                        showStatus('error', '❌ 오류: ' + data.message);
                    }
                })
                .catch(e => {
                    console.error('오류:', e);
                    showStatus('error', '❌ 오류: ' + e.message);
                });
        }

        // 페이지 로드 시 초기화
        window.addEventListener('load', function() {
            generateTableRows();
            // talents_data.json에서 직접 로드
            loadTalentsFromJSON();
            loadNotices();
        });

        // ===== 공지사항 관리 =====
        async function loadNotices() {
            try {
                const res = await fetch('/get-notices');
                const data = await res.json();
                renderNotices(data.notices || []);
            } catch (e) {
                document.getElementById('noticeListAdmin').innerHTML = '<p style="color:#888;text-align:center;">공지사항을 불러오지 못했습니다.</p>';
            }
        }

        // 수정할 공지 ID를 저장
        let editingNoticeId = null;

        function renderNotices(notices) {
            const container = document.getElementById('noticeListAdmin');
            if (!notices.length) {
                container.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">아직 공지사항이 없어요!</p>';
                return;
            }
            const sorted = [...notices].reverse();
            container.innerHTML = sorted.map(n => `
                <div id="notice-card-${n.id}" style="border:2px solid #ddd;border-radius:10px;padding:15px;margin-bottom:12px;background:#f9f9f9;">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
                        <div style="flex:1;">
                            <div style="font-weight:700;color:#3B5998;font-size:1.05em;margin-bottom:6px;">${n.title}</div>
                            <div style="color:#555;font-size:0.9em;line-height:1.6;white-space:pre-wrap;">${n.content}</div>
                            <div style="color:#888;font-size:0.8em;margin-top:8px;">📅 ${n.date} &nbsp;|&nbsp; ✍️ ${n.author}</div>
                        </div>
                        <div style="display:flex;flex-direction:column;gap:6px;">
                            <button onclick="openEditModal(${n.id}, ${JSON.stringify(n.title).replace(/"/g,'&quot;')}, ${JSON.stringify(n.content).replace(/"/g,'&quot;')}, '${n.author}')" style="background:#1976D2;color:white;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:0.85em;white-space:nowrap;">✏️ 수정</button>
                            <button onclick="deleteNotice(${n.id})" style="background:#e53935;color:white;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:0.85em;white-space:nowrap;">🗑️ 삭제</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openEditModal(id, title, content, author) {
            editingNoticeId = id;
            document.getElementById('editTitle').value = title;
            document.getElementById('editContent').value = content;
            document.getElementById('editAuthor').value = author;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            editingNoticeId = null;
        }

        async function saveEdit() {
            const title = document.getElementById('editTitle').value.trim();
            const content = document.getElementById('editContent').value.trim();
            const author = document.getElementById('editAuthor').value.trim() || '선생님';

            if (!title || !content) {
                alert('제목과 내용을 모두 입력해 주세요!');
                return;
            }

            try {
                const res = await fetch('/update-notice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: editingNoticeId, title, content, author })
                });
                const data = await res.json();
                if (data.success) {
                    showNoticeStatus('success', '✅ 공지사항이 수정되었습니다!');
                    closeEditModal();
                    loadNotices();
                } else {
                    showNoticeStatus('error', '❌ 오류: ' + data.message);
                }
            } catch (e) {
                showNoticeStatus('error', '❌ 오류: ' + e.message);
            }
        }

        async function saveNotice() {
            const title = document.getElementById('noticeTitle').value.trim();
            const content = document.getElementById('noticeContent').value.trim();
            const author = document.getElementById('noticeAuthor').value.trim() || '선생님';

            if (!title || !content) {
                showNoticeStatus('error', '❌ 제목과 내용을 모두 입력해 주세요!');
                return;
            }

            const today = new Date().toISOString().split('T')[0];
            showNoticeStatus('loading', '⏳ 공지사항을 저장하는 중...');

            try {
                const res = await fetch('/save-notice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content, date: today, author })
                });
                const data = await res.json();
                if (data.success) {
                    showNoticeStatus('success', '✅ 공지사항이 저장되었습니다!');
                    document.getElementById('noticeTitle').value = '';
                    document.getElementById('noticeContent').value = '';
                    loadNotices();
                } else {
                    showNoticeStatus('error', '❌ 오류: ' + data.message);
                }
            } catch (e) {
                showNoticeStatus('error', '❌ 오류: ' + e.message);
            }
        }

        async function deleteNotice(id) {
            if (!confirm('이 공지사항을 삭제할까요?')) return;
            try {
                const res = await fetch('/delete-notice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                const data = await res.json();
                if (data.success) {
                    showNoticeStatus('success', '✅ 삭제되었습니다!');
                    loadNotices();
                } else {
                    showNoticeStatus('error', '❌ 오류: ' + data.message);
                }
            } catch (e) {
                showNoticeStatus('error', '❌ 오류: ' + e.message);
            }
        }

        function showNoticeStatus(type, msg) {
            const el = document.getElementById('noticeStatus');
            el.className = 'status show ' + type;
            el.textContent = msg;
        }
    </script>

    <!-- 공지사항 수정 모달 -->
    <div id="editModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;">
        <div style="background:white;border-radius:15px;padding:35px;width:90%;max-width:550px;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <h3 style="color:#3B5998;margin-bottom:20px;font-size:1.3em;">✏️ 공지사항 수정</h3>
            <div style="margin-bottom:12px;">
                <label style="display:block;color:#555;margin-bottom:5px;font-weight:600;">제목</label>
                <input id="editTitle" type="text" style="width:100%;padding:10px 14px;border:2px solid #ddd;border-radius:8px;font-size:1em;">
            </div>
            <div style="margin-bottom:12px;">
                <label style="display:block;color:#555;margin-bottom:5px;font-weight:600;">내용</label>
                <textarea id="editContent" rows="6" style="width:100%;padding:10px 14px;border:2px solid #ddd;border-radius:8px;font-size:1em;resize:vertical;font-family:inherit;"></textarea>
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block;color:#555;margin-bottom:5px;font-weight:600;">작성자</label>
                <input id="editAuthor" type="text" style="width:100%;padding:10px 14px;border:2px solid #ddd;border-radius:8px;font-size:1em;">
            </div>
            <div style="display:flex;gap:10px;">
                <button onclick="saveEdit()" style="flex:1;padding:12px;background:linear-gradient(135deg,#3B5998,#8B6BB8);color:white;border:none;border-radius:10px;font-size:1em;font-weight:700;cursor:pointer;">✅ 저장</button>
                <button onclick="closeEditModal()" style="flex:1;padding:12px;background:#ccc;color:#333;border:none;border-radius:10px;font-size:1em;font-weight:700;cursor:pointer;">❌ 취소</button>
            </div>
        </div>
    </div>

    <!-- 공지사항 관리 섹션 -->
    <div class="container" style="margin-top:0;padding-top:0;">
        <div class="admin-card">
            <h1>📢 공지사항 관리</h1>
            <div id="noticeStatus" class="status"></div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-bottom:30px;">
                <div>
                    <h3 style="color:#3B5998;margin-bottom:15px;">✏️ 새 공지사항 작성</h3>
